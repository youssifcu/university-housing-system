name: 🔍 Lint & Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  lint:
    name: Lint ${{ matrix.project }}
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        project: [backend, mobile, web]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
      
      - name: Cache npm packages
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-18-${{ hashFiles('${{ matrix.project }}/package-lock.json') }}
      
      - name: Install ${{ matrix.project }} dependencies
        run: cd ${{ matrix.project }} && npm install --legacy-peer-deps
      
      - name: Check if lint script exists
        id: lint_check
        run: cd ${{ matrix.project }} && npm run | grep -q " lint" && echo "has_lint=true" >> $GITHUB_OUTPUT || echo "has_lint=false" >> $GITHUB_OUTPUT
        continue-on-error: true
      
      - name: Run ESLint
        if: steps.lint_check.outputs.has_lint == 'true'
        run: cd ${{ matrix.project }} && npm run lint
        continue-on-error: true

  security:
    name: Node Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
      
      - name: Cache npm packages
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-audit
      
      - name: Run npm audit (backend)
        continue-on-error: true
        run: |
          cd backend
          npm audit --production 2>&1 || true
      
      - name: Run npm audit (mobile)
        continue-on-error: true
        run: |
          cd mobile
          npm audit --production 2>&1 || true
      
      - name: Run npm audit (web)
        continue-on-error: true
        run: |
          cd web
          npm audit --production 2>&1 || true

  summary:
    name: Lint Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, security]
    
    steps:
      - name: Create summary
        run: |
          echo "## ✅ Lint & Quality Check Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Checks Performed" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Code linting (ESLint)" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Security audits" >> $GITHUB_STEP_SUMMARY

