name: 🔍 Lint & Code Quality

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  lint:
    name: Lint Code
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        project: [backend, mobile, web]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'
      
      - name: Install root dependencies
        run: npm install
        if: matrix.project == 'backend'
      
      - name: Install ${{ matrix.project }} dependencies
        run: cd ${{ matrix.project }} && npm install
      
      - name: Check formatting
        run: cd ${{ matrix.project }} && npm run format:check
        continue-on-error: true
      
      - name: Run ESLint
        run: cd ${{ matrix.project }} && npm run lint
        continue-on-error: true
      
      - name: TypeScript check
        run: cd ${{ matrix.project }} && npm run type-check
        continue-on-error: true

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'
      
      - name: Install root dependencies
        run: npm install
      
      - name: Run npm audit
        run: npm audit --production
        continue-on-error: true
      
      - name: Check for secrets
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified
        continue-on-error: true

  quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'
      
      - name: Install dependencies
        run: |
          npm install
          cd backend && npm install
          cd ../mobile && npm install
          cd ../web && npm install
      
      - name: Check file sizes
        run: |
          echo "## 📦 Build Size Check" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Bundle Sizes" >> $GITHUB_STEP_SUMMARY
          cd web && npm run build 2>/dev/null && du -sh dist/ >> $GITHUB_STEP_SUMMARY || echo "Build not available"
      
      - name: Code duplication check
        run: npx jscpd --version || echo "jscpd not available"
        continue-on-error: true

  analysis:
    name: Static Code Analysis
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18.x'
          cache: 'npm'
      
      - name: Analyze code structure
        run: |
          echo "## 🔍 Code Analysis" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          echo "### Project Structure" >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY
          find . -type f \( -name "*.js" -o -name "*.ts" -o -name "*.tsx" \) | wc -l | xargs echo "Total source files:" >> $GITHUB_STEP_SUMMARY
          echo "```" >> $GITHUB_STEP_SUMMARY

  summary:
    name: Lint Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, security, quality, analysis]
    
    steps:
      - name: Create summary
        run: |
          echo "## ✅ Lint Check Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Checks Performed" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Code formatting" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ ESLint rules" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ TypeScript types" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Security audits" >> $GITHUB_STEP_SUMMARY
          echo "- ✓ Code quality" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Review workflow results above for any issues." >> $GITHUB_STEP_SUMMARY
