name: "CodeQL"

on:
  push:
    branches: [ main, web ]
  pull_request:
    branches: [ main ]

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript-typescript' ]   # مهم: استخدم الاسم الجديد لمشاريع JS/TS

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'          # أو الإصدار المناسب لمشروعك

    - name: Install dependencies
      run: |
        npm ci || npm install       # لو فشل npm ci، جرب npm install

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: ${{ matrix.language }}
        build-mode: none             # مهم لمشاريع JS/TS عشان مايحاولش يعمل build تلقائي

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3