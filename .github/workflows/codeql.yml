name: "CodeQL"

on:
  push:
    branches: [ main, web ]
  pull_request:
    branches: [ main ]

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'          # استخدم الإصدار المناسب لمشروعك

    - name: Install dependencies
      run: |
        if [ -f package-lock.json ]; then
          npm ci
        else
          npm install
        fi

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v3
      with:
        languages: 'javascript-typescript'   # اللغة الوحيدة المطلوبة
        build-mode: none                      # مهم لمشاريع JS/TS

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v3