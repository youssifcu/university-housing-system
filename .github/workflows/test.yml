name: 🧪 Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  test:
    name: Test ${{ matrix.project }} (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        # Node 20 has caused sporadic install failures (Expo & some deps)
        node-version: [18.x]
        project: [backend, mobile, web]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      
      - name: Cache npm packages
        uses: actions/cache@v3
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ matrix.node-version }}-${{ hashFiles('package-lock.json', '${{ matrix.project }}/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-${{ matrix.node-version }}-
      
      - name: Install dependencies for ${{ matrix.project }}
        run: cd ${{ matrix.project }} && npm install --legacy-peer-deps
      
      - name: Check if tests script exists
        id: test_check
        run: |
          cd ${{ matrix.project }}
          if npm run | grep -q " test"; then
            echo "has_tests=true" >> $GITHUB_OUTPUT
          else
            echo "has_tests=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Run tests for ${{ matrix.project }}
        if: steps.test_check.outputs.has_tests == 'true'
        run: cd ${{ matrix.project }} && npm test
      
      - name: Skip tests (no test script)
        if: steps.test_check.outputs.has_tests != 'true'
        run: echo "ℹ️ No test script found for ${{ matrix.project }}"
