name: 🧪 Tests

on:
  push:
    branches: [main, develop, "feature/**"]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [18.x, 20.x]
        project: [backend, mobile, web]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install root dependencies
        run: npm install
        if: matrix.project == 'backend'
      
      - name: Install ${{ matrix.project }} dependencies
        run: cd ${{ matrix.project }} && npm install
      
      - name: Run tests for ${{ matrix.project }}
        run: cd ${{ matrix.project }} && npm test -- --coverage
        continue-on-error: true
      
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./${{ matrix.project }}/coverage/coverage-final.json
          flags: ${{ matrix.project }}
          name: ${{ matrix.project }}-coverage
          fail_ci_if_error: false
      
      - name: Archive test results
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results-${{ matrix.project }}-node${{ matrix.node-version }}
          path: ${{ matrix.project }}/coverage/
          retention-days: 30

  coverage:
    name: Check Coverage
    runs-on: ubuntu-latest
    needs: test
    if: always()
    
    steps:
      - name: Download all coverage artifacts
        uses: actions/download-artifact@v3
      
      - name: Report coverage
        run: |
          echo "## 📊 Test Coverage Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Coverage reports have been generated." >> $GITHUB_STEP_SUMMARY
          echo "Check the artifacts for detailed coverage information." >> $GITHUB_STEP_SUMMARY

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    if: always()
    needs: [test, coverage]
    
    steps:
      - name: Create summary
        run: |
          echo "## ✅ Test Run Complete" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Results" >> $GITHUB_STEP_SUMMARY
          echo "- Backend: ${{ needs.test.outputs.backend-status || 'Unknown' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Mobile: ${{ needs.test.outputs.mobile-status || 'Unknown' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Web: ${{ needs.test.outputs.web-status || 'Unknown' }}" >> $GITHUB_STEP_SUMMARY
